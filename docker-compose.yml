services:
  db:
    image: postgres:16
    container_name: facilcar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: facilcar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - facilcar_db_data:/var/lib/postgresql/data

volumes:
  facilcar_db_data:

